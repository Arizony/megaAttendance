<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minutes and Seconds Counter</title>
</head>
<body>

<h1 id="timer">02:00:00</h1>
<h2 id="two">j</h2>

<script>
    let seconds = 0;
    let minutes = 0;
    let hour = 2;
    let timer;

    function updateDisplay() {
        let displayHours = hour < 10 ? "0" + hour : hour;
        let displayMinutes = minutes < 10 ? "0" + minutes : minutes;
        let displaySeconds = seconds < 10 ? "0" + seconds : seconds;

        document.getElementById("timer").innerText =
            displayHours + ":" + displayMinutes + ":" + displaySeconds;
    }

    function startTimer() {
        timer = setInterval(() => {
            if (seconds === 0) {
                if (minutes === 0) {
                    if (hour === 0) {
                        clearInterval(timer);
                        return;
                    }
                    hour--;
                    minutes = 59;
                    seconds = 59;
                } else {
                    minutes--;
                    seconds = 59;
                }
            } else {
                seconds--;
            }

            updateDisplay();
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timer);
    }

    function resetTimer() {
        clearInterval(timer);
        seconds = 0;
        minutes = 0;
        hour = 2;
        updateDisplay();
    }

    updateDisplay();
    startTimer();

</script>

</body>
</html>
